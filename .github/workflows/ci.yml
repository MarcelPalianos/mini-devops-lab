name: Mini DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  first-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show current files
        run: ls -la

      - name: Show working directory
        run: pwd

      - name: Print message
        run: echo "Pipeline is working successfully"
